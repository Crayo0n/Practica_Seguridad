<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flask + Dijkstra</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header class="topbar">
      <h1>Flask + Dijkstra</h1>
      <nav>
        <a href="{{ url_for('index') }}">Inicio</a>
        <a
          href="https://es.wikipedia.org/wiki/Algoritmo_de_Dijkstra"
          target="_blank"
          rel="noopener"
          >¿Qué es Dijkstra?</a
        >
      </nav>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-container">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %} {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      Hecho con Flask · Dijkstra sin pesos negativos
    </footer>
  </body>
</html>
